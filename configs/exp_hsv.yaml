# HSV Experiment Configuration
experiment: "exp_hsv"
colorspace: "hsv"

model:
  name: "resnet18"
  pretrained: false
  num_classes: 10

training:
  epochs: 20
  batch_size: 32
  learning_rate: 0.001
  optimizer: "adam"
  scheduler: "step"
  scheduler_params:
    step_size: 10
    gamma: 0.1

data:
  dataset: "cifar10"
  num_workers: 4

device: "cuda"

output_dir: "results/exp_hsv"
